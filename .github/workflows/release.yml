name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to package"
        required: true
  push:
    tags:
      - "v*"

jobs:
  package:
    name: Package Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: python scripts/release/version.py audit
      - run: python -m unittest tests/test_project_forge.py
      - run: python scripts/install_test.py
      - run: python scripts/release/package_release.py --out dist --host-bundles
      - uses: actions/upload-artifact@v4
        with:
          name: project-forge-release
          path: dist/*
      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: dist/*
