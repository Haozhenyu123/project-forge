name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run unit tests
        run: python -m unittest tests/test_project_forge.py

      - name: Validate eval scenarios
        run: python scripts/evals/validate_scenarios.py evals/scenarios

      - name: Compile scripts
        run: python -m compileall scripts
