name: Project Forge CI

on:
  push:
  pull_request:

jobs:
  verify_fastapi:
    name: Verify fastapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: fastapi install
        working-directory: .
        run: pip install -r requirements.txt
      - name: fastapi test
        working-directory: .
        run: python -m pytest
      - name: fastapi lint
        working-directory: .
        run: python -m ruff check .
      - name: fastapi typecheck
        working-directory: .
        run: python -m mypy .
      - name: fastapi build (legacy)
        working-directory: .
        run: echo FastAPI projects do not require a build step
      - name: fastapi smoke
        working-directory: .
        run: python -m pytest tests/smoke/
