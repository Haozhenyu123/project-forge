name: Project Forge CI

on:
  push:
  pull_request:

jobs:
  verify:
    name: Project Forge CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python -m pytest
      - run: python -m ruff check .
      - run: python -m mypy .
      - run: echo FastAPI projects do not require a build step
      - run: python -m pytest tests/smoke/
