name: Project Forge CI

on:
  push:
  pull_request:

jobs:
  verify_chrome_extension:
    name: Verify chrome-extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: chrome-extension install
        working-directory: .
        run: npm ci
      - name: chrome-extension test
        working-directory: .
        run: npm run test
      - name: chrome-extension lint
        working-directory: .
        run: npm run lint
      - name: chrome-extension typecheck
        working-directory: .
        run: npm run typecheck
      - name: chrome-extension build
        working-directory: .
        run: npm run build
      - name: chrome-extension smoke
        working-directory: .
        run: npm run smoke
