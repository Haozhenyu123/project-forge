name: Project Forge CI

on:
  push:
  pull_request:

jobs:
  verify_nextjs:
    name: Verify nextjs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: nextjs install
        working-directory: .
        run: npm ci
      - name: nextjs test
        working-directory: .
        run: npm run test
      - name: nextjs lint
        working-directory: .
        run: npm run lint
      - name: nextjs typecheck
        working-directory: .
        run: npm run typecheck
      - name: nextjs build
        working-directory: .
        run: npm run build
      - name: nextjs smoke
        working-directory: .
        run: npm run smoke
  verify_fastapi:
    name: Verify fastapi
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: fastapi install
        working-directory: api
        run: python -m pip install -r requirements.txt
      - name: fastapi test
        working-directory: api
        run: python -m pytest
      - name: fastapi lint
        working-directory: api
        run: python -m ruff check .
      - name: fastapi typecheck
        working-directory: api
        run: python -m mypy .
      - name: fastapi build
        working-directory: api
        run: python -m compileall app
      - name: fastapi smoke
        working-directory: api
        run: python -m pytest tests/smoke
  integration_smoke:
    name: Multi-stack contract smoke
    runs-on: ubuntu-latest
    needs: [verify_nextjs, verify_fastapi]
    steps:
      - uses: actions/checkout@v4
      - run: python scripts/cli.py superpowers-ready --slug nextjs-fastapi-demo --json .
